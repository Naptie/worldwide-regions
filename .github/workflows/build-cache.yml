name: Build Wikidata Cache

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Wikidata cache
        run: npx tsx scripts/build-wikidata-cache.ts

      - name: Build canonical labels from modood + Wikidata
        run: npx tsx scripts/build-canonical-labels.ts

      - name: Compile TypeScript
        run: pnpm build

      - name: Run sample ETL pipeline
        run: node dist/index.js --sample

      - name: Upload Wikidata cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: wikidata-cache
          path: data/wikidata-cache.json
          retention-days: 30

      - name: Upload canonical labels artifact
        uses: actions/upload-artifact@v4
        with:
          name: canonical-labels
          path: resources/canonical-labels.json
          retention-days: 30
